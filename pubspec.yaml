name: oip_sentinel
description: "AI-Based Inventory, Sales, and Payroll Management System for Oroquieta Ice Plant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.18.1
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.3
  image_picker: ^0.8.4+4
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.4
  open_filex: ^4.4.0
  camera: ^0.10.5+5
  google_mlkit_object_detection: ^0.11.0
  google_mlkit_commons: ^0.6.1
  flutter_webrtc: ^1.2.1

  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  flutter_facebook_auth: ^7.1.2
  google_sign_in: ^7.2.0
  firebase_storage: ^13.0.4
  firebase_app_check: ^0.4.1+2
  permission_handler: ^11.0.1
  http: ^1.1.0
  device_info_plus: ^10.1.0
  battery_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  google_fonts: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ice_block.png
    - assets/sales.png
    - assets/monitor.png
    - assets/discrepancy.png
    - assets/profile.png
    - assets/bell.png
    - assets/location.png
    - assets/shift.png
    - assets/notes.png
    - assets/edit.png
    - assets/delete.png
    - assets/x.png
    - assets/save.png
    - assets/icon.png
    - assets/facebook.png
    - assets/google.png
    - assets/cube.png
    - assets/maximize.png
    - assets/report.png
    - assets/filter.png
    - assets/audit.png
